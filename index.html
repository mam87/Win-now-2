<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MamonTV - تلفزيون ذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#12121a;--card:#1a1a28;--cardH:#222236;--acc:#e50914;--accG:rgba(229,9,20,0.4);--acc2:#ff6b35;--t1:#f0f0f0;--t2:#8a8a9a;--t3:#5a5a6a;--brd:rgba(255,255,255,0.06);--grad:linear-gradient(135deg,#e50914 0%,#ff6b35 50%,#e50914 100%);--glass:rgba(18,18,26,0.85);--r:12px;--r2:20px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo','Tajawal',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--t3);border-radius:3px}

/* Loading */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s,visibility .5s}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none}
.slogo{font-size:3rem;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:pls 1.5s infinite}
@keyframes pls{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.sbar{width:240px;height:4px;background:var(--card);border-radius:2px;overflow:hidden;margin-top:2rem}
.sbar-f{height:100%;width:0%;background:var(--grad);border-radius:2px;transition:width .3s}
.stxt{margin-top:1rem;color:var(--t2);font-size:.85rem}

/* Navbar */
.nav{position:fixed;top:0;left:0;right:0;height:58px;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 1.5rem;z-index:100;gap:.8rem}
.nbrand{font-size:1.3rem;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;flex-shrink:0}
.nlinks{display:flex;gap:.2rem;list-style:none}
.nlinks a{text-decoration:none;color:var(--t2);padding:.4rem .7rem;border-radius:8px;font-size:.8rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .3s}
.nlinks a:hover,.nlinks a.on{color:var(--t1);background:rgba(229,9,20,.15)}
.nlinks a.on{color:var(--acc)}
.nsearch{margin-right:auto;position:relative}
.nsearch input{background:var(--card);border:1px solid var(--brd);color:var(--t1);padding:.4rem .7rem .4rem 2rem;border-radius:25px;width:220px;font-family:inherit;font-size:.78rem;outline:none;transition:all .3s}
.nsearch input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accG);width:300px}
.nsearch input::placeholder{color:var(--t3)}
.nsearch svg{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--t3);width:14px;height:14px}
.ncnt{background:var(--acc);color:#fff;padding:.2rem .6rem;border-radius:20px;font-size:.7rem;font-weight:700}

.app{margin-top:58px;min-height:calc(100vh - 58px)}

/* Sections */
.shdr{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 1.5rem .7rem}
.stitle{font-size:1.15rem;font-weight:700}
.ssub{color:var(--t3);font-size:.78rem}
.sall{color:var(--acc);cursor:pointer;font-size:.8rem}

/* Categories */
.cats{display:flex;gap:.35rem;padding:0 1.5rem .7rem;overflow-x:auto;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cbtn{background:var(--card);border:1px solid var(--brd);color:var(--t2);padding:.3rem .9rem;border-radius:25px;font-family:inherit;font-size:.72rem;cursor:pointer;white-space:nowrap;transition:all .3s}
.cbtn:hover{background:var(--cardH);color:var(--t1)}
.cbtn.on{background:var(--acc);border-color:var(--acc);color:#fff}
.ccnt{background:rgba(255,255,255,.15);padding:.05rem .3rem;border-radius:10px;font-size:.62rem;margin-right:.2rem}

/* Grid */
.grd{display:grid;padding:0 1.5rem 1.5rem;gap:.7rem}
.grd-ch{grid-template-columns:repeat(auto-fill,minmax(145px,1fr))}
.grd-vod{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}

/* Channel Card */
.ccard{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:.9rem;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative}
.ccard:hover{transform:translateY(-3px);border-color:rgba(229,9,20,.3);box-shadow:0 8px 28px rgba(0,0,0,.3),0 0 12px var(--accG)}
.clogo{width:56px;height:56px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;margin-bottom:.5rem;overflow:hidden;border:2px solid var(--brd)}
.clogo img{width:100%;height:100%;object-fit:cover}
.clogo .ph{font-size:1.2rem;font-weight:700;color:var(--acc)}
.cname{font-size:.76rem;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cgrp{font-size:.63rem;color:var(--t3);margin-top:.15rem}

/* VOD Card */
.vcard{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;transition:all .3s;overflow:hidden;position:relative}
.vcard:hover{transform:translateY(-4px);border-color:rgba(229,9,20,.3);box-shadow:0 10px 36px rgba(0,0,0,.4),0 0 18px var(--accG)}
.vposter{width:100%;aspect-ratio:2/3;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.vposter img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.vcard:hover .vposter img{transform:scale(1.06)}
.vposter .phi{font-size:2.2rem;color:var(--t3)}
.pbtn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);width:42px;height:42px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .3s;color:#fff;font-size:.9rem}
.vcard:hover .pbtn{opacity:1;transform:translate(-50%,-50%) scale(1)}
.vinfo{padding:.5rem}
.vtitle{font-size:.76rem;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vmeta{font-size:.63rem;color:var(--t3);margin-top:.15rem}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);z-index:200;display:none;align-items:center;justify-content:center;padding:1.5rem}
.modal.on{display:flex}
.pmodal{background:var(--bg2);border-radius:var(--r2);width:100%;max-width:880px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.6);animation:sUp .35s cubic-bezier(.16,1,.3,1)}
@keyframes sUp{from{transform:translateY(30px);opacity:0}}
.phdr{display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.1rem;background:var(--card);border-bottom:1px solid var(--brd)}
.ptitle{font-size:.88rem;font-weight:600}
.pclose{background:none;border:none;color:var(--t2);cursor:pointer;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .3s;font-size:1.1rem}
.pclose:hover{background:rgba(229,9,20,.2);color:var(--acc)}
.pvid{width:100%;aspect-ratio:16/9;background:#000}
.pvid video{width:100%;height:100%;outline:none}
.pinfo{padding:.7rem 1.1rem;display:flex;align-items:center;gap:.7rem}
.plg{width:38px;height:38px;border-radius:50%;background:var(--card);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.plg img{width:100%;height:100%;object-fit:cover}
.pdet .pn{font-weight:600;font-size:.85rem}
.pdet .pg{color:var(--t3);font-size:.72rem}

/* Pages */
.pg-view{display:none}.pg-view.on{display:block}

/* Hero */
.hero{position:relative;height:250px;background:linear-gradient(135deg,#1a0a0e 0%,#0a0a1a 50%,#0a1a15 100%);display:flex;align-items:center;padding:0 2rem;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,var(--accG),transparent 60%);opacity:.25}
.hcontent{position:relative;z-index:1;max-width:520px}
.hbadge{display:inline-block;background:var(--acc);color:#fff;padding:.2rem .7rem;border-radius:20px;font-size:.68rem;font-weight:700;margin-bottom:.7rem}
.hero h1{font-size:2rem;font-weight:900;line-height:1.2;margin-bottom:.3rem}
.hero p{color:var(--t2);font-size:.85rem}
.hstats{display:flex;gap:1.5rem;margin-top:1rem}
.hstat .hn{font-size:1.5rem;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hstat .hl{font-size:.68rem;color:var(--t3)}

/* Fav */
.fbtn{position:absolute;top:.35rem;left:.35rem;background:rgba(0,0,0,.5);border:none;color:var(--t3);width:26px;height:26px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;transition:all .3s;font-size:.8rem}
.fbtn:hover,.fbtn.on{color:#ff4757;background:rgba(255,71,87,.2)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;color:var(--t3);text-align:center}
.empty .ei{font-size:2.2rem;margin-bottom:.7rem}
.lmore{grid-column:1/-1;background:var(--card);border:1px solid var(--brd);color:var(--t2);padding:.7rem;border-radius:var(--r);font-family:inherit;font-size:.82rem;cursor:pointer;transition:all .3s}
.lmore:hover{background:var(--cardH);color:var(--t1);border-color:var(--acc)}
.fi{animation:cIn .4s ease both}
@keyframes cIn{from{opacity:0;transform:translateY(10px)}}

@media(max-width:768px){
  .nav{padding:0 .7rem;gap:.4rem}.nsearch input{width:120px}.nsearch input:focus{width:160px}.nlinks{display:none}
  .mnav{position:fixed;bottom:0;left:0;right:0;background:var(--glass);backdrop-filter:blur(20px);border-top:1px solid var(--brd);display:flex;justify-content:space-around;padding:.35rem 0;z-index:100}
  .mnav a{display:flex;flex-direction:column;align-items:center;gap:.1rem;color:var(--t3);text-decoration:none;font-size:.58rem;padding:.2rem;transition:color .3s}
  .mnav a.on{color:var(--acc)}.mnav a svg{width:19px;height:19px}
  .app{margin-bottom:60px}.hero{height:200px;padding:0 1rem}.hero h1{font-size:1.4rem}
  .shdr,.cats,.grd{padding-left:.7rem;padding-right:.7rem}
  .grd-ch{grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:.5rem}
  .grd-vod{grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:.5rem}
}
@media(min-width:769px){.mnav{display:none}}
</style>
</head>

let C=[],M=[],S=[],fv=JSON.parse(localStorage.getItem('mtv2')||'[]'),hl=null,cf={live:'all',movies:'all',series:'all'};

function parse(t){
  const ls=t.split('\n'),r=[];let c=null;
  for(let i=0;i<ls.length;i++){
    const l=ls[i].trim();
    if(l.startsWith('#EXTINF:')){
      c={};const tn=l.match(/tvg-name="([^"]*)"/),tl=l.match(/tvg-logo="([^"]*)"/),gt=l.match(/group-title="([^"]*)"/);
      const ci=l.lastIndexOf(','),dn=ci!==-1?l.substring(ci+1).trim():'';
      c.name=tn?tn[1]:dn;c.dn=dn||(tn?tn[1]:'Unknown');c.logo=tl?tl[1]:'';c.group=gt?gt[1]:'أخرى';
    }else if(l&&!l.startsWith('#')&&c){c.url=l;c.id='i'+r.length;r.push(c);c=null;}
  }return r;
}

function cat(items){
  const c=[],m=[],s=[];
  items.forEach(i=>{
    const g=(i.group||'').toLowerCase(),n=(i.name||'').toLowerCase();
    if(g.includes('movie')||g.includes('فيلم')||g.includes('aflam')||g.includes('film')||g.includes('vod')||(g.includes('cinema')&&!g.includes('channel')))m.push(i);
    else if(g.includes('series')||g.includes('مسلسل')||g.includes('mosalsal')||g.includes('episode')||g.includes('season')||g.includes('s0')||n.match(/s\d{1,2}\s*e\d{1,3}/i)||n.match(/ep\s*\d/i))s.push(i);
    else c.push(i);
  });return{c,m,s};
}

function grps(items){const g={};items.forEach(i=>{g[i.group]=(g[i.group]||0)+1;});return Object.entries(g).sort((a,b)=>b[1]-a[1]);}

function rCats(items,el,type){
  document.getElementById(el).innerHTML='<button class="cbtn on" onclick="fc(\''+type+'\',\'all\',this)">الكل <span class="ccnt">'+items.length+'</span></button>'+
    grps(items).map(([n,c])=>'<button class="cbtn" onclick="fc(\''+type+'\',\''+n.replace(/'/g,"\\'")+'\',this)">'+n+' <span class="ccnt">'+c+'</span></button>').join('');
}

function chH(i,x){
  return '<div class="ccard fi" style="animation-delay:'+Math.min(x*10,180)+'ms" onclick="pl(\''+i.id+'\')">'+
    '<button class="fbtn '+(fv.includes(i.id)?'on':'')+'" onclick="event.stopPropagation();tf(\''+i.id+'\',this)">'+(fv.includes(i.id)?'❤️':'🤍')+'</button>'+
    '<div class="clogo">'+(i.logo?'<img src="'+i.logo+'" onerror="this.parentElement.innerHTML=\'<div class=ph>'+(i.dn[0]||'?')+'</div>\'" loading="lazy">':'<div class="ph">'+(i.dn[0]||'?')+'</div>')+'</div>'+
    '<div class="cname">'+i.dn+'</div><div class="cgrp">'+i.group+'</div></div>';
}

function voH(i,x){
  return '<div class="vcard fi" style="animation-delay:'+Math.min(x*8,150)+'ms" onclick="pl(\''+i.id+'\')">'+
    '<button class="fbtn '+(fv.includes(i.id)?'on':'')+'" onclick="event.stopPropagation();tf(\''+i.id+'\',this)">'+(fv.includes(i.id)?'❤️':'🤍')+'</button>'+
    '<div class="vposter">'+(i.logo?'<img src="'+i.logo+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" loading="lazy"><div class="phi" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center">🎬</div>':'<div class="phi">🎬</div>')+
    '<div class="pbtn">▶</div></div><div class="vinfo"><div class="vtitle">'+i.dn+'</div><div class="vmeta">'+i.group+'</div></div></div>';
}

function rG(items,el,type,lim){
  const e=document.getElementById(el);
  if(!items.length){e.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ei">'+(type==='ch'?'📺':'🎬')+'</div><div>لا توجد نتائج</div></div>';return;}
  const mx=lim||200,sh=items.slice(0,mx),fn=type==='ch'?chH:voH;
  e.innerHTML=sh.map((i,x)=>fn(i,x)).join('');
  if(items.length>mx)e.innerHTML+='<button class="lmore" onclick="lm(\''+el+'\',\''+type+'\','+mx+')">عرض المزيد ('+(items.length-mx)+' متبقي)</button>';
}

function gF(t){const f=cf[t];if(t==='live')return f==='all'?C:C.filter(i=>i.group===f);if(t==='movies')return f==='all'?M:M.filter(i=>i.group===f);return f==='all'?S:S.filter(i=>i.group===f);}
function lm(el,type,cur){let items;if(el==='lg')items=gF('live');else if(el==='mg')items=gF('movies');else if(el==='sg')items=gF('series');else return;rG(items,el,type,cur+300);}
function fc(type,cat,btn){cf[type]=cat;btn.parentElement.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  if(type==='live')rG(gF('live'),'lg','ch');else if(type==='movies')rG(gF('movies'),'mg','vod');else rG(gF('series'),'sg','vod');}

function rHome(){
  let h='';
  if(C.length)h+='<div class="shdr"><div><div class="stitle">📺 أبرز القنوات</div></div><a class="sall" onclick="go(\'live\')">عرض الكل ←</a></div><div class="grd grd-ch">'+C.slice(0,12).map((c,i)=>chH(c,i)).join('')+'</div>';
  if(M.length)h+='<div class="shdr"><div><div class="stitle">🎬 أحدث الأفلام</div></div><a class="sall" onclick="go(\'movies\')">عرض الكل ←</a></div><div class="grd grd-vod">'+M.slice(0,10).map((m,i)=>voH(m,i)).join('')+'</div>';
  if(S.length)h+='<div class="shdr"><div><div class="stitle">📺 أحدث المسلسلات</div></div><a class="sall" onclick="go(\'series\')">عرض الكل ←</a></div><div class="grd grd-vod">'+S.slice(0,10).map((s,i)=>voH(s,i)).join('')+'</div>';
  document.getElementById('hc').innerHTML=h;
}

function go(p){
  document.querySelectorAll('.pg-view').forEach(x=>x.classList.remove('on'));
  document.getElementById('v-'+p).classList.add('on');
  document.querySelectorAll('[data-p]').forEach(a=>a.classList.toggle('on',a.dataset.p===p));
  if(p==='fav')rFav();window.scrollTo({top:0,behavior:'smooth'});
}

function search(q){
  q=q.toLowerCase().trim();const p=document.querySelector('.pg-view.on').id.replace('v-','');
  const f=i=>i.dn.toLowerCase().includes(q)||i.group.toLowerCase().includes(q)||i.name.toLowerCase().includes(q);
  if(!q){if(p==='live')rG(C,'lg','ch');else if(p==='movies')rG(M,'mg','vod');else if(p==='series')rG(S,'sg','vod');return;}
  if(p==='home'){go('live');rG(C.filter(f),'lg','ch');}
  else if(p==='live')rG(C.filter(f),'lg','ch');
  else if(p==='movies')rG(M.filter(f),'mg','vod');
  else if(p==='series')rG(S.filter(f),'sg','vod');
}

function tf(id,btn){const idx=fv.indexOf(id);if(idx===-1){fv.push(id);btn.classList.add('on');btn.innerHTML='❤️';}else{fv.splice(idx,1);btn.classList.remove('on');btn.innerHTML='🤍';}localStorage.setItem('mtv2',JSON.stringify(fv));}
function rFav(){const all=[...C,...M,...S],fa=all.filter(i=>fv.includes(i.id));document.getElementById('fs').textContent=fa.length+' عنصر';
  if(!fa.length){document.getElementById('fg').innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ei">❤️</div><div>لا توجد مفضلات</div></div>';return;}rG(fa,'fg','vod');}

function pl(id){
  const all=[...C,...M,...S],item=all.find(i=>i.id===id);if(!item)return;
  document.getElementById('mt').textContent=item.dn;document.getElementById('mn').textContent=item.dn;
  document.getElementById('mgr').textContent=item.group;
  document.getElementById('ml').innerHTML=item.logo?'<img src="'+item.logo+'" onerror="this.parentElement.textContent=\'📺\'">':'📺';
  const v=document.getElementById('vid');if(hl){hl.destroy();hl=null;}
  if(item.url.includes('.m3u8')){
    if(typeof Hls!=='undefined'&&Hls.isSupported()){hl=new Hls({enableWorker:true});hl.loadSource(item.url);hl.attachMedia(v);hl.on(Hls.Events.MANIFEST_PARSED,()=>v.play().catch(()=>{}));}
    else if(v.canPlayType('application/vnd.apple.mpegurl')){v.src=item.url;v.play().catch(()=>{});}
  }else{v.src=item.url;v.play().catch(()=>{});}
  document.getElementById('modal').classList.add('on');document.body.style.overflow='hidden';
}
function cp(){document.getElementById('vid').pause();document.getElementById('vid').src='';if(hl){hl.destroy();hl=null;}document.getElementById('modal').classList.remove('on');document.body.style.overflow='';}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)cp();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')cp();});

  const sf=document.getElementById('sf'),st=document.getElementById('st');
  sf.style.width='30%';st.textContent='جاري تحليل القنوات...';
  setTimeout(()=>{
    const items=parse(M3U_RAW);
    sf.style.width='60%';st.textContent='تم العثور على '+items.length+' قناة';
    const{c,m,s}=cat(items);C=c;M=m;S=s;
    sf.style.width='80%';st.textContent='جاري بناء الواجهة...';
    setTimeout(()=>{
      document.getElementById('cnt').textContent=items.length;
      document.getElementById('xC').textContent=c.length;document.getElementById('xM').textContent=m.length;document.getElementById('xS').textContent=s.length;
      document.getElementById('ls').textContent=c.length+' قناة';document.getElementById('ms').textContent=m.length+' فيلم';document.getElementById('ss').textContent=s.length+' مسلسل';
      rHome();rCats(c,'lc','live');rG(c,'lg','ch');rCats(m,'mc','movies');rG(m,'mg','vod');rCats(s,'sc','series');rG(s,'sg','vod');
      sf.style.width='100%';st.textContent='جاهز!';
      setTimeout(()=>{document.getElementById('splash').classList.add('gone');document.getElementById('appWrap').style.display='block';},400);
    },100);
  },200);
})();
