<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MamonTV - بث مباشر</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#05080e;--bg2:#0b1120;--bg3:#111827;--card:#151d2e;--cardH:#1c2740;
  --acc:#00d4ff;--accG:rgba(0,212,255,.25);--acc2:#0ea5e9;--acc3:#7c3aed;
  --live:#ef4444;--liveG:rgba(239,68,68,.3);
  --t1:#eef2ff;--t2:#94a3b8;--t3:#475569;
  --brd:rgba(148,163,184,.08);
  --grad:linear-gradient(135deg,#00d4ff,#7c3aed);
  --glass:rgba(11,17,32,.82);
}
body{font-family:'IBM Plex Sans Arabic','Noto Kufi Arabic',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--t3);border-radius:9px}

/* BG Ambient */
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 20%,rgba(0,212,255,.04),transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(124,58,237,.04),transparent 50%);pointer-events:none;z-index:0}

/* Splash */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s,visibility .6s}
#splash.out{opacity:0;visibility:hidden;pointer-events:none}
.sp-logo{font-family:'Noto Kufi Arabic';font-size:2.8rem;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.02em}
.sp-sub{color:var(--t3);font-size:.8rem;margin-top:.3rem;margin-bottom:2rem}
.sp-bar{width:200px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.sp-fill{height:100%;width:0%;background:var(--grad);border-radius:2px;transition:width .3s}
.sp-txt{margin-top:1rem;color:var(--t2);font-size:.8rem}

/* Top Nav */
.topnav{position:fixed;top:0;left:0;right:0;height:56px;background:var(--glass);backdrop-filter:blur(24px) saturate(1.4);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 1.2rem;z-index:100;gap:.8rem}
.topnav .brand{font-family:'Noto Kufi Arabic';font-size:1.15rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;flex-shrink:0;letter-spacing:-.01em}
.topnav .live-dot{width:7px;height:7px;border-radius:50%;background:var(--live);margin-right:.4rem;animation:blink 1.5s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.tabs{display:flex;gap:0;flex-shrink:0}
.tabs a{color:var(--t3);font-size:.75rem;font-weight:500;padding:.4rem .7rem;cursor:pointer;border-radius:6px;transition:all .25s;text-decoration:none;white-space:nowrap;position:relative}
.tabs a:hover{color:var(--t2);background:rgba(255,255,255,.03)}
.tabs a.on{color:var(--acc);background:rgba(0,212,255,.08)}
.tabs a.on::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--acc);border-radius:1px}

.srch{margin-right:auto;position:relative}
.srch input{background:rgba(255,255,255,.04);border:1px solid var(--brd);color:var(--t1);padding:.38rem .7rem .38rem 2rem;border-radius:20px;width:200px;font-family:inherit;font-size:.75rem;outline:none;transition:all .3s}
.srch input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accG);width:280px;background:rgba(0,212,255,.04)}
.srch input::placeholder{color:var(--t3)}
.srch svg{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--t3);width:13px;height:13px}

.badge{background:var(--grad);color:#fff;padding:.15rem .55rem;border-radius:12px;font-size:.65rem;font-weight:700;flex-shrink:0}

/* Main */
#wrap{display:none;position:relative;z-index:1}
#wrap.on{display:block}
.main{margin-top:56px;min-height:calc(100vh - 56px)}

/* Hero */
.hero{position:relative;padding:2.5rem 2rem 2rem;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,255,.06) 0%,transparent 40%,rgba(124,58,237,.06) 100%)}
.hero-inner{position:relative;z-index:1;display:flex;align-items:center;gap:2rem;max-width:900px}
.hero-txt h1{font-family:'Noto Kufi Arabic';font-size:1.8rem;font-weight:900;line-height:1.2;margin-bottom:.3rem}
.hero-txt h1 span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-txt p{color:var(--t2);font-size:.82rem;line-height:1.5}
.hero-stats{display:flex;gap:1.5rem;margin-top:1rem}
.hstat{text-align:center}
.hstat .n{font-family:'Noto Kufi Arabic';font-size:1.6rem;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hstat .l{font-size:.65rem;color:var(--t3);margin-top:-.1rem}

/* Section */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem .6rem}
.sec-t{font-family:'Noto Kufi Arabic';font-size:1rem;font-weight:700;display:flex;align-items:center;gap:.4rem}
.sec-s{color:var(--t3);font-size:.72rem}

/* Filter Bar */
.fbar{display:flex;gap:.3rem;padding:0 1.5rem .6rem;overflow-x:auto;scrollbar-width:none}
.fbar::-webkit-scrollbar{display:none}
.fbtn{background:rgba(255,255,255,.03);border:1px solid var(--brd);color:var(--t3);padding:.28rem .8rem;border-radius:20px;font-family:inherit;font-size:.7rem;cursor:pointer;white-space:nowrap;transition:all .25s}
.fbtn:hover{background:rgba(255,255,255,.06);color:var(--t2)}
.fbtn.on{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.3);color:var(--acc)}
.fcnt{opacity:.5;font-size:.6rem;margin-right:.2rem}

/* Grid */
.grd{display:grid;padding:0 1.5rem 2rem;gap:.6rem}
.grd-ch{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}

/* Channel Card */
.ch{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:.85rem;cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;overflow:hidden}
.ch::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad);opacity:0;transition:opacity .3s}
.ch:hover{transform:translateY(-4px);border-color:rgba(0,212,255,.2);box-shadow:0 8px 32px rgba(0,0,0,.3),0 0 0 1px rgba(0,212,255,.1)}
.ch:hover::before{opacity:1}
.ch:active{transform:translateY(-2px)}

.ch-logo{width:54px;height:54px;border-radius:14px;background:var(--bg2);display:flex;align-items:center;justify-content:center;margin-bottom:.5rem;overflow:hidden;border:1px solid var(--brd);transition:all .3s}
.ch:hover .ch-logo{border-color:rgba(0,212,255,.2);box-shadow:0 0 16px var(--accG)}
.ch-logo img{width:100%;height:100%;object-fit:contain;padding:4px}
.ch-logo .ph{font-family:'Noto Kufi Arabic';font-size:1rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.ch-name{font-size:.73rem;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:1.9em}
.ch-grp{font-size:.6rem;color:var(--t3);margin-top:.2rem;display:flex;align-items:center;gap:.25rem}
.ch-grp .dot{width:4px;height:4px;border-radius:50%;background:var(--acc);opacity:.5}

/* Fav */
.fv{position:absolute;top:.45rem;left:.45rem;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);border:none;color:var(--t3);width:26px;height:26px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3;transition:all .25s;font-size:.75rem}
.fv:hover,.fv.on{color:#f43f5e;background:rgba(244,63,94,.15)}

/* Play overlay */
.ch-play{position:absolute;inset:0;background:rgba(0,212,255,.05);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;border-radius:14px}
.ch:hover .ch-play{opacity:1}
.ch-play svg{width:28px;height:28px;fill:var(--acc);filter:drop-shadow(0 0 8px var(--accG))}

/* Pages */
.pg{display:none}.pg.on{display:block}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(5,8,14,.92);backdrop-filter:blur(16px);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
.modal.on{display:flex}
.mbox{background:var(--bg2);border:1px solid var(--brd);border-radius:18px;width:100%;max-width:860px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.5);animation:mUp .4s cubic-bezier(.16,1,.3,1)}
@keyframes mUp{from{transform:translateY(24px) scale(.97);opacity:0}}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;background:var(--bg3);border-bottom:1px solid var(--brd)}
.mhdr .mt{font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:.5rem}
.mhdr .mt .live-tag{background:var(--live);color:#fff;padding:.1rem .4rem;border-radius:4px;font-size:.55rem;font-weight:700;display:flex;align-items:center;gap:.25rem}
.mhdr .mt .live-tag::before{content:'';width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1s infinite}
.mx{background:none;border:none;color:var(--t3);cursor:pointer;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .25s;font-size:1rem}
.mx:hover{background:rgba(239,68,68,.15);color:var(--live)}
.mvid{width:100%;aspect-ratio:16/9;background:#000}
.mvid video{width:100%;height:100%;outline:none}
.minfo{padding:.65rem 1rem;display:flex;align-items:center;gap:.7rem;border-top:1px solid var(--brd)}
.mlogo{width:36px;height:36px;border-radius:10px;background:var(--card);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--brd)}
.mlogo img{width:100%;height:100%;object-fit:contain;padding:3px}
.mdet .mdn{font-weight:600;font-size:.82rem}
.mdet .mdg{color:var(--t3);font-size:.7rem}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;color:var(--t3);text-align:center;grid-column:1/-1}
.empty .ei{font-size:2rem;margin-bottom:.6rem}
.lm{grid-column:1/-1;background:rgba(255,255,255,.03);border:1px solid var(--brd);color:var(--t2);padding:.65rem;border-radius:10px;font-family:inherit;font-size:.8rem;cursor:pointer;transition:all .3s}
.lm:hover{background:rgba(0,212,255,.06);color:var(--acc);border-color:rgba(0,212,255,.2)}

.fi{animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}}

/* Mobile Nav */
@media(max-width:768px){
  .topnav{padding:0 .6rem;gap:.3rem;height:50px}
  .tabs{display:none}
  .srch input{width:110px;font-size:.72rem}.srch input:focus{width:160px}
  .bnav{position:fixed;bottom:0;left:0;right:0;background:var(--glass);backdrop-filter:blur(24px);border-top:1px solid var(--brd);display:flex;justify-content:space-around;padding:.3rem 0 env(safe-area-inset-bottom,.3rem);z-index:100}
  .bnav a{display:flex;flex-direction:column;align-items:center;gap:.08rem;color:var(--t3);text-decoration:none;font-size:.55rem;padding:.2rem .5rem;transition:color .25s;border-radius:8px}
  .bnav a.on{color:var(--acc)}
  .bnav a svg{width:18px;height:18px}
  .main{margin-top:50px;margin-bottom:58px}
  .hero{padding:1.5rem 1rem 1.2rem}
  .hero-txt h1{font-size:1.3rem}
  .sec-hdr,.fbar,.grd{padding-left:.7rem;padding-right:.7rem}
  .grd-ch{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.45rem}
  .ch{padding:.7rem;border-radius:10px}
  .ch-logo{width:44px;height:44px;border-radius:10px}
  .ch-name{font-size:.68rem}
}
@media(min-width:769px){.bnav{display:none}}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-logo">MamonTV</div>
  <div class="sp-sub">بث مباشر • قنوات عربية وعالمية</div>
  <div class="sp-bar"><div class="sp-fill" id="sf"></div></div>
  <div class="sp-txt" id="st">جاري تحميل القنوات...</div>
</div>

<div id="wrap">
  <nav class="topnav">
    <div class="live-dot"></div>
    <div class="brand" onclick="go('home')">MamonTV</div>
    <div class="tabs">
      <a onclick="go('home')" class="on" data-p="home">الرئيسية</a>
      <a onclick="go('all')" data-p="all">جميع القنوات</a>
      <a onclick="go('fav')" data-p="fav">❤️ المفضلة</a>
    </div>
    <div class="srch">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="si" placeholder="ابحث عن قناة..." oninput="doSearch(this.value)">
    </div>
    <div class="badge" id="cnt">0 قناة</div>
  </nav>

  <div class="bnav">
    <a onclick="go('home')" class="on" data-p="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg>الرئيسية</a>
    <a onclick="go('all')" data-p="all"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>القنوات</a>
    <a onclick="go('fav')" data-p="fav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>المفضلة</a>
  </div>

  <main class="main">
    <!-- HOME -->
    <div class="pg on" id="v-home">
      <div class="hero"><div class="hero-inner">
        <div class="hero-txt">
          <h1><span>MamonTV</span> بث مباشر</h1>
          <p>شاهد مئات القنوات العربية والرياضية والإخبارية والترفيهية مباشرة</p>
          <div class="hero-stats">
            <div class="hstat"><div class="n" id="xT">0</div><div class="l">قناة</div></div>
            <div class="hstat"><div class="n" id="xG">0</div><div class="l">تصنيف</div></div>
          </div>
        </div>
      </div></div>
      <div id="hc"></div>
    </div>

    <!-- ALL CHANNELS -->
    <div class="pg" id="v-all">
      <div class="sec-hdr"><div><div class="sec-t">📡 جميع القنوات</div><div class="sec-s" id="as"></div></div></div>
      <div class="fbar" id="af"></div>
      <div class="grd grd-ch" id="ag"></div>
    </div>

    <!-- FAVORITES -->
    <div class="pg" id="v-fav">
      <div class="sec-hdr"><div><div class="sec-t">❤️ القنوات المفضلة</div><div class="sec-s" id="fss"></div></div></div>
      <div class="grd grd-ch" id="fg"></div>
    </div>
  </main>
</div>

<!-- Player -->
<div class="modal" id="modal">
  <div class="mbox">
    <div class="mhdr">
      <div class="mt"><span class="live-tag">LIVE</span><span id="mt"></span></div>
      <button class="mx" onclick="cp()">✕</button>
    </div>
    <div class="mvid"><video id="vid" controls autoplay></video></div>
    <div class="minfo">
      <div class="mlogo" id="ml"></div>
      <div class="mdet"><div class="mdn" id="mn"></div><div class="mdg" id="mg"></div></div>
    </div>
  </div>
</div>

let CH=[],fv=JSON.parse(localStorage.getItem('mtv3')||'[]'),hl=null,curF='all';

function parse(t){
  const ls=t.split('\n'),r=[];let c=null;
  for(let i=0;i<ls.length;i++){
    const l=ls[i].trim();
    if(l.startsWith('#EXTINF:')){
      c={};
      const tn=l.match(/tvg-name="([^"]*)"/),tl=l.match(/tvg-logo="([^"]*)"/),gt=l.match(/group-title="([^"]*)"/);
      const ci=l.lastIndexOf(','),dn=ci!==-1?l.substring(ci+1).trim():'';
      c.name=tn?tn[1]:dn;c.dn=dn||(tn?tn[1]:'Unknown');c.logo=tl?tl[1]:'';c.group=gt?gt[1]:'';
      if(!c.group)c.group='أخرى';
    }else if(l&&!l.startsWith('#')&&c){c.url=l;c.id='c'+r.length;r.push(c);c=null;}
  }return r;
}

// Group name mapping for Arabic display
const gMap={'BEIN SPORTS HD':'⚽ beIN Sports','BEIN SPORTS SD-LOW':'⚽ beIN SD','ARABIC':'📺 عربية','ARABIC SPORTS':'⚽ رياضة عربية','MBC & ROTANA':'🎬 MBC & روتانا','OSN & BEIN-entre':'🎭 OSN & beIN','TURKISH':'🇹🇷 تركية','MOVIES':'🎬 أفلام','SSC SPORTS':'⚽ SSC','SPORTS TV':'⚽ رياضة','ISLAMIC':'🕌 إسلامية','General':'📺 عامة','News':'📰 إخبارية','Religious':'🕌 دينية','Sports':'⚽ رياضة','Music':'🎵 موسيقى','Kids':'👶 أطفال','Movies':'🎬 أفلام','Classic':'📺 كلاسيك','Documentary':'🎥 وثائقية','Business':'💼 أعمال','Education':'📚 تعليمية','Comedy':'😂 كوميديا','Travel':'✈️ سفر','Outdoor':'🏕 طبيعة','Lifestyle':'🏠 لايف ستايل','Legislative':'🏛 برلمانية','Family':'👨‍👩‍👧 عائلية','Culture':'🎭 ثقافية'};

function gLabel(g){return gMap[g]||g;}

function grps(items){const g={};items.forEach(i=>{const k=i.group;g[k]=(g[k]||0)+1;});return Object.entries(g).sort((a,b)=>b[1]-a[1]);}

function chCard(i,x){
  const d=Math.min(x*8,150);
  return `<div class="ch fi" style="animation-delay:${d}ms" onclick="pl('${i.id}')">
    <button class="fv ${fv.includes(i.id)?'on':''}" onclick="event.stopPropagation();tf('${i.id}',this)">${fv.includes(i.id)?'❤️':'🤍'}</button>
    <div class="ch-play"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
    <div class="ch-logo">${i.logo?`<img src="${i.logo}" onerror="this.parentElement.innerHTML='<div class=ph>${(i.dn[0]||'?')}</div>'" loading="lazy">`:`<div class="ph">${i.dn[0]||'?'}</div>`}</div>
    <div class="ch-name">${i.dn}</div>
    <div class="ch-grp"><span class="dot"></span>${gLabel(i.group)}</div>
  </div>`;
}

function rGrid(items,el,lim){
  const e=document.getElementById(el);
  if(!items.length){e.innerHTML='<div class="empty"><div class="ei">📡</div><div>لا توجد قنوات</div></div>';return;}
  const mx=lim||200,sh=items.slice(0,mx);
  e.innerHTML=sh.map((i,x)=>chCard(i,x)).join('');
  if(items.length>mx)e.innerHTML+=`<button class="lm" onclick="moreCh('${el}',${mx})">عرض المزيد (${items.length-mx} قناة)</button>`;
}

function moreCh(el,cur){
  const items=curF==='all'?CH:CH.filter(i=>i.group===curF);
  rGrid(items,el,cur+300);
}

function rCats(){
  const el=document.getElementById('af');
  const gs=grps(CH);
  el.innerHTML=`<button class="fbtn on" onclick="filt('all',this)">الكل <span class="fcnt">${CH.length}</span></button>`+
    gs.map(([n,c])=>`<button class="fbtn" onclick="filt('${n.replace(/'/g,"\\'")}',this)">${gLabel(n)} <span class="fcnt">${c}</span></button>`).join('');
}

function filt(cat,btn){
  curF=cat;
  btn.parentElement.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const items=cat==='all'?CH:CH.filter(i=>i.group===cat);
  rGrid(items,'ag');
}

function rHome(){
  const gs=grps(CH);
  let h='';
  // Show first 5 groups as sections
  const showGroups=gs.slice(0,6);
  showGroups.forEach(([name,count])=>{
    const items=CH.filter(i=>i.group===name).slice(0,8);
    h+=`<div class="sec-hdr"><div><div class="sec-t">${gLabel(name)}</div><div class="sec-s">${count} قناة</div></div><a style="color:var(--acc);cursor:pointer;font-size:.75rem" onclick="go('all')">الكل ←</a></div>
    <div class="grd grd-ch">${items.map((i,x)=>chCard(i,x)).join('')}</div>`;
  });
  document.getElementById('hc').innerHTML=h;
}

// Nav
function go(p){
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('on'));
  document.getElementById('v-'+p).classList.add('on');
  document.querySelectorAll('[data-p]').forEach(a=>a.classList.toggle('on',a.dataset.p===p));
  if(p==='fav')rFav();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Search
function doSearch(q){
  q=q.toLowerCase().trim();
  const p=document.querySelector('.pg.on').id.replace('v-','');
  if(!q){if(p==='all')rGrid(CH,'ag');return;}
  if(p==='home')go('all');
  const f=CH.filter(i=>i.dn.toLowerCase().includes(q)||i.group.toLowerCase().includes(q)||i.name.toLowerCase().includes(q));
  rGrid(f,'ag');
}

// Favorites
function tf(id,btn){
  const idx=fv.indexOf(id);
  if(idx===-1){fv.push(id);btn.classList.add('on');btn.innerHTML='❤️';}
  else{fv.splice(idx,1);btn.classList.remove('on');btn.innerHTML='🤍';}
  localStorage.setItem('mtv3',JSON.stringify(fv));
}
function rFav(){
  const fa=CH.filter(i=>fv.includes(i.id));
  document.getElementById('fss').textContent=fa.length+' قناة';
  if(!fa.length){document.getElementById('fg').innerHTML='<div class="empty"><div class="ei">❤️</div><div>لم تضف قنوات للمفضلة بعد<br><small style="color:var(--t3)">اضغط 🤍 على أي قناة لإضافتها</small></div></div>';return;}
  rGrid(fa,'fg');
}

// Player
function pl(id){
  const item=CH.find(i=>i.id===id);if(!item)return;
  document.getElementById('mt').textContent=item.dn;
  document.getElementById('mn').textContent=item.dn;
  document.getElementById('mg').textContent=gLabel(item.group);
  document.getElementById('ml').innerHTML=item.logo?`<img src="${item.logo}" onerror="this.parentElement.textContent='📺'">`:'📺';
  const v=document.getElementById('vid');
  if(hl){hl.destroy();hl=null;}
  // Remove old error msg
  const oldErr=document.getElementById('perr');if(oldErr)oldErr.remove();
  const url=item.url.trim();
  const isHLS=url.includes('.m3u8');
  const isMpd=url.includes('.mpd');
  const isDirectStream=!isHLS&&!isMpd&&!url.match(/\.(mp4|mp3|webm|ogg|flv)(\?|$)/i);
  // Try HLS.js for .m3u8 AND unknown/direct streams (IPTV streams often need HLS)
  if((isHLS||isDirectStream)&&typeof Hls!=='undefined'&&Hls.isSupported()){
    hl=new Hls({enableWorker:true,xhrSetup:function(xhr){xhr.timeout=15000;}});
    hl.loadSource(url);hl.attachMedia(v);
    hl.on(Hls.Events.MANIFEST_PARSED,()=>{v.play().catch(()=>{});});
    hl.on(Hls.Events.ERROR,function(ev,data){
      if(data.fatal){
        hl.destroy();hl=null;
        // Fallback: try direct play
        v.src=url;
        v.play().catch(()=>{
          showPlayerErr('تعذر تشغيل هذه القناة - قد يكون الرابط معطل أو محجوب');
        });
      }
    });
  } else if(v.canPlayType('application/vnd.apple.mpegurl')&&(isHLS||isDirectStream)){
    v.src=url;v.play().catch(()=>{showPlayerErr('تعذر تشغيل القناة');});
  } else {
    v.src=url;v.play().catch(()=>{showPlayerErr('تعذر تشغيل هذه القناة - صيغة غير مدعومة');});
  }
  v.onerror=function(){showPlayerErr('خطأ في تحميل البث - الرابط قد يكون معطل');};
  document.getElementById('modal').classList.add('on');document.body.style.overflow='hidden';
}
function showPlayerErr(msg){
  let el=document.getElementById('perr');
  if(!el){el=document.createElement('div');el.id='perr';el.style.cssText='padding:.6rem 1rem;background:rgba(239,68,68,.1);border-top:1px solid rgba(239,68,68,.2);color:#f87171;font-size:.78rem;text-align:center';
  document.querySelector('.mbox').appendChild(el);}
  el.textContent=msg;
}
function cp(){
  const v=document.getElementById('vid');v.pause();v.removeAttribute('src');v.load();v.onerror=null;
  if(hl){hl.destroy();hl=null;}
  const err=document.getElementById('perr');if(err)err.remove();
  document.getElementById('modal').classList.remove('on');document.body.style.overflow='';
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)cp();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')cp();});

// Init
(function(){
  const sf=document.getElementById('sf'),st=document.getElementById('st');
  sf.style.width='20%';
  setTimeout(()=>{
    sf.style.width='50%';st.textContent='جاري تحليل القنوات...';
    CH=parse(RAW);
    sf.style.width='75%';st.textContent='تم العثور على '+CH.length+' قناة';
    setTimeout(()=>{
      const gs=grps(CH);
      document.getElementById('cnt').textContent=CH.length+' قناة';
      document.getElementById('xT').textContent=CH.length;
      document.getElementById('xG').textContent=gs.length;
      document.getElementById('as').textContent=CH.length+' قناة متاحة';
      rHome();rCats();rGrid(CH,'ag');
      sf.style.width='100%';st.textContent='جاهز!';
      setTimeout(()=>{document.getElementById('splash').classList.add('out');document.getElementById('wrap').classList.add('on');},350);
    },100);
  },200);
})();
</script>
